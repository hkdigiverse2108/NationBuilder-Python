{% extends "base.html" %}
{% block title %}Admin Login — Nation Builder{% endblock %}

{% block progress_bar %}{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="card" style="width: 100%; max-width: 400px; padding: 50px 40px;">
        <div class="card-header" style="margin-bottom: 40px;">
            <h1 class="card-title">Admin Access</h1>
            <p class="card-subtitle">Please enter your credentials to manage records</p>
        </div>
        
        <form action="/admin/login" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required />
            </div>
            
            {% if error %}
            <div style="color: #d32f2f; background: #ffebee; padding: 12px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; margin-bottom: 20px; text-align: center; border: 1px solid #ffcdd2;">
                {{ error }}
            </div>
            {% endif %}
            
            <button type="submit" class="btn btn-primary" style="margin-top: 10px; font-size: 1rem; letter-spacing: 0.05em;">LOGIN TO DASHBOARD</button>
        </form>
        
        <div style="text-align: center; margin-top: 30px;">
            <a href="/" style="color: var(--text-soft); font-size: 0.85rem; text-decoration: none; font-weight: 600;">← Back to Result Portal</a>
        </div>
    </div>
</div>
{% endblock %}
