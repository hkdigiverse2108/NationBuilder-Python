{% extends "base.html" %}
{% set active_step = 2 %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h2 class="card-title">Verify Identity</h2>
    <p id="p2-student-name-banner" style="color: var(--text-soft); font-weight: 600;"></p>
  </div>
  <div class="form-group">
    <label>Mobile Number</label>
    <input type="tel" id="phone-input" maxlength="10" placeholder="10-digit number" />
  </div>
  <button class="btn btn-primary" id="send-otp-btn">Send OTP</button>
  
  <div id="otp-section" class="hidden" style="margin-top: 30px; padding-top: 30px; border-top: 2px dashed var(--border);">
    <p style="text-align: center; margin-bottom: 20px; font-size: 0.9rem;">OTP sent to <strong id="sms-sent-number" style="color: var(--navy);"></strong></p>
    <div class="form-group">
      <label>Enter 6-Digit OTP</label>
      <input type="text" id="otp-input" maxlength="6" style="text-align: center; letter-spacing: 0.5em; font-weight: 900; font-size: 1.5rem;" />
    </div>
    <div id="otp-error" class="error-msg hidden" style="color: #ef4444; text-align: center; margin-bottom: 15px; font-weight: 600;"></div>
    <button class="btn btn-primary" id="verify-otp-btn">Verify OTP & View Result</button>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/verify.js"></script>
{% endblock %}
